# Never cache post routes
map $request_uri $dont_cache {
    default "0";
    ~*/posts/.* "1";
}


geo $whitelist {
    default 0; # Default: Apply rate limits to everyone
    172.16.0.0/12 1; # Whitelist all IPs in 172.*.*.*
    192.168.0.0/16 1;
    10.0.0.0/8 1;
}

map $whitelist $limit {
    0 $binary_remote_addr;
    1 "";
}


proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=5g inactive=60m use_temp_path=off;
limit_req_zone $limit zone=ip:10m rate=45r/m;
server {
    listen 8081 ssl;
    listen 8080;
    server_name localhost;

    ssl_certificate /etc/nginx/conf.d/self-signed.crt;
    ssl_certificate_key /etc/nginx/conf.d/self-signed.key;


    location / {
        # Rate limit requests
        limit_req zone=ip burst=20 nodelay;

        proxy_cache my_cache;
        proxy_no_cache $dont_cache;
        add_header X-Cache $upstream_cache_status always;
        proxy_pass http://web04-backend:8000;

        location ~* \.(css|js|html|jpg|png|gif|svg)$ {
            rewrite ^/public/(.*) /$1 break;
            add_header X-Cache $upstream_cache_status always;
            proxy_ignore_headers Cache-Control;
            proxy_cache_valid 200 1h;
            proxy_pass http://web04-backend:8000;
        }
    }
}
